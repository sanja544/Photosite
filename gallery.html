<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Галерея робіт</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    /* Нормальна сітка, щоб не розлазилось */
    .gallery-grid{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      justify-items: center;
      margin-bottom: 18px;
    }
    @media (max-width: 900px){ .gallery-grid{ grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px){ .gallery-grid{ grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 420px){ .gallery-grid{ grid-template-columns: 1fr; } }

    .gallery-item{
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      transition: transform .2s ease, box-shadow .2s ease;
      cursor: pointer;
      user-select: none;
    }
    @media (max-width: 600px){
      .gallery-item{ width: 150px; height: 150px; }
    }

    .gallery-item:hover{
      transform: scale(1.04);
      box-shadow: 0 8px 20px rgba(0,255,136,0.35);
    }

    /* Лайтбокс: на клік відкриваємо по центру і ВМІЩУЄМО в екран */
    .lightbox{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 9999;
    }
    .lightbox.open{ display:flex; }

    .lightbox img{
      max-width: 96vw;
      max-height: 92vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 14px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.6);
      cursor: zoom-out;
      background: rgba(34,34,54,0.65);
    }

    .lightbox-hint{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 14px;
      color: rgba(255,255,255,0.85);
      font-size: 0.95rem;
      z-index: 10000;
      display: none;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
    }
    .lightbox.open + .lightbox-hint{ display: block; }
  </style>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-BLX6EBEFQ4"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-BLX6EBEFQ4');
</script>
</head>
<body>
  <div class="gallery-container">
    <h1>Галерея робіт</h1>

    <div class="gallery-grid" id="grid">
      <img src="gallery/1.jpg"  alt="Робота 1"  class="gallery-item">
      <img src="gallery/2.jpg"  alt="Робота 2"  class="gallery-item">
      <img src="gallery/3.jpg"  alt="Робота 3"  class="gallery-item">
      <img src="gallery/4.jpg"  alt="Робота 4"  class="gallery-item">
      <img src="gallery/5.jpg"  alt="Робота 5"  class="gallery-item">
      <img src="gallery/6.jpg"  alt="Робота 6"  class="gallery-item">
      <img src="gallery/7.jpg"  alt="Робота 7"  class="gallery-item">
      <img src="gallery/8.jpg"  alt="Робота 8"  class="gallery-item">
      <img src="gallery/9.jpg"  alt="Робота 9"  class="gallery-item">
      <img src="gallery/10.jpg" alt="Робота 10" class="gallery-item">
      <img src="gallery/11.jpg" alt="Робота 11" class="gallery-item">
      <img src="gallery/12.jpg" alt="Робота 12" class="gallery-item">
      <img src="gallery/13.jpg" alt="Робота 13" class="gallery-item">
    </div>

    <a href="index.html" class="back-button">Повернутися</a>
  </div>

  <!-- Лайтбокс -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <img id="lightbox-img" alt="Перегляд фото">
  </div>
  <div class="lightbox-hint">Натисніть на фото або ESC — закрити</div>

  <script>
    const items = document.querySelectorAll('.gallery-item');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    function openLightbox(src, alt) {
      lightboxImg.src = src;
      lightboxImg.alt = alt || 'Фото';
      lightbox.classList.add('open');
      lightbox.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImg.src = '';
      document.body.style.overflow = '';
    }

    items.forEach(img => {
      img.addEventListener('click', () => openLightbox(img.src, img.alt));
    });

    // клік по фону/фото закриває
    lightbox.addEventListener('click', closeLightbox);

    // ESC закриває
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && lightbox.classList.contains('open')) closeLightbox();
    });
  </script>
</body>
</html>
